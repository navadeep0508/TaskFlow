services:
  - type: web
    name: taskflow
    env: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PORT
        value: 10000
        generateValue: false

databases:
  - name: taskflow-db
    databaseName: taskflow
    user: taskflow
